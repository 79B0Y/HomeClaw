<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeClaw – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500&family=Noto+Sans+JP:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:   #e8352a;
  --cyan:  #29d9c2;
  --bg:    #0f0709;
  --text:  #f0ece8;
  --muted: rgba(240,236,232,0.42);
  --card:  rgba(12,6,8,0.82);
  --bdr:   rgba(255,255,255,0.08);
}

html, body {
  height: 100%; overflow: hidden;
  font-family: 'Nunito', 'Noto Sans SC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ─── BG ─── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 90% 75% at 50% 110%, rgba(140,18,10,0.55) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 20% 50%, rgba(160,25,15,0.14) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 50%, rgba(41,217,194,0.05) 0%, transparent 60%);
}
.bg::after {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.011) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.011) 1px, transparent 1px);
  background-size: 56px 56px;
}

/* ─── BUBBLES ─── */
.bubbles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.bubble {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(255,90,70,0.14), transparent 70%);
  border: 1px solid rgba(255,90,70,0.09);
  animation: rise linear infinite;
}
@keyframes rise {
  from { transform: translateY(0); opacity: 0; }
  8%   { opacity: 0.75; }
  92%  { opacity: 0.25; }
  to   { transform: translateY(-115vh); opacity: 0; }
}

/* ─── PAGE: centered column ─── */
.page {
  position: relative; z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1.5rem 1.5rem 2rem;
  gap: 0;
}

/* ─── TOP BAR ─── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 2rem;
}

.brand-row {
  display: flex; align-items: center; gap: 0.55rem;
}
.brand-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #38b6ff, #0060dd);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 14px rgba(0,130,255,0.4);
  flex-shrink: 0;
}
.brand-name {
  font-size: 1.1rem; font-weight: 900;
  letter-spacing: 0.02em; color: #fff;
}

/* Language switcher */
.lang-switcher {
  display: flex; align-items: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px;
  padding: 0.28rem 0.4rem;
  gap: 0.1rem;
}
.lang-btn {
  padding: 0.28rem 0.7rem;
  border-radius: 100px;
  font-size: 0.72rem; font-weight: 800;
  letter-spacing: 0.06em;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
  user-select: none;
  border: none; background: none;
  font-family: inherit;
}
.lang-btn.active {
  background: rgba(41,217,194,0.18);
  color: var(--cyan);
}
.lang-btn:hover:not(.active) { color: #fff; }

/* ─── MASCOT ─── */
.mascot-wrap {
  margin-bottom: -10px;
  animation: bob 3.8s ease-in-out infinite;
  filter:
    drop-shadow(0 22px 48px rgba(200,40,20,0.65))
    drop-shadow(0 6px 14px rgba(200,40,20,0.35));
}
@keyframes bob {
  0%,100% { transform: translateY(0) rotate(-1.5deg); }
  50%      { transform: translateY(-14px) rotate(1.5deg); }
}

/* ─── CARD ─── */
.card {
  width: min(400px, 92vw);
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 24px;
  padding: 2rem 2rem 1.8rem;
  backdrop-filter: blur(36px) saturate(1.5);
  box-shadow:
    0 0 0 1px rgba(232,53,42,0.1),
    0 30px 80px rgba(0,0,0,0.85),
    inset 0 1px 0 rgba(255,255,255,0.07);
  animation: slideUp 0.7s 0.05s cubic-bezier(.22,.9,.36,1) both;
  position: relative; overflow: hidden;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(22px) scale(0.97); }
  to   { opacity: 1; transform: none; }
}

/* top glow line */
.card::before {
  content: ''; position: absolute;
  top: 0; left: 10%; right: 10%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  border-radius: 100px;
}

/* headline inside card */
.card-headline {
  text-align: center;
  margin-bottom: 1.6rem;
}
.card-title {
  font-size: 1.35rem; font-weight: 900;
  color: #fff; letter-spacing: 0.01em;
  margin-bottom: 0.25rem;
}
.card-desc {
  font-size: 0.8rem; color: var(--muted);
  line-height: 1.5;
}

/* form */
.lbl {
  display: block;
  font-size: 0.6rem; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 0.4rem;
}
.field { position: relative; margin-bottom: 1rem; }
.field-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.4rem;
}
.field-row .lbl { margin: 0; }
.forgot {
  font-size: 0.6rem; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--cyan); text-decoration: none;
  transition: opacity .2s;
}
.forgot:hover { opacity: 0.6; }
.ico {
  position: absolute; left: 0.88rem; top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.25);
  pointer-events: none; display: flex;
}
input {
  width: 100%;
  background: rgba(255,255,255,0.045);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 11px;
  padding: 0.74rem 0.9rem 0.74rem 2.45rem;
  color: #fff; font-size: 0.9rem;
  font-family: inherit; font-weight: 600;
  outline: none;
  transition: border-color .22s, box-shadow .22s, background .22s;
}
input::placeholder { color: rgba(255,255,255,0.2); font-weight: 500; }
input:focus {
  border-color: var(--cyan);
  background: rgba(41,217,194,0.04);
  box-shadow: 0 0 0 3px rgba(41,217,194,0.12);
}

/* sign-in btn */
.btn {
  width: 100%; margin-top: 0.2rem;
  padding: 0.86rem;
  background: linear-gradient(135deg, #38b6ff, #005ecc);
  border: none; border-radius: 12px;
  color: #fff; font-family: inherit;
  font-size: 0.95rem; font-weight: 900;
  letter-spacing: 0.04em; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 0.45rem;
  box-shadow: 0 5px 22px rgba(0,90,220,0.45);
  transition: transform .15s, filter .15s, box-shadow .15s;
  position: relative; overflow: hidden;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.14), transparent);
  opacity: 0; transition: opacity .2s;
}
.btn:hover { transform: translateY(-1px); filter: brightness(1.1); box-shadow: 0 8px 28px rgba(0,90,220,0.6); }
.btn:hover::after { opacity: 1; }
.btn:active { transform: none; }

/* social login */
.social-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0.65rem; margin-top: 0.75rem;
}
.social-btn {
  display: flex; align-items: center; justify-content: center; gap: 0.45rem;
  padding: 0.62rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: rgba(255,255,255,0.65);
  font-family: inherit; font-size: 0.78rem; font-weight: 700;
  cursor: pointer;
  transition: background .2s, border-color .2s, color .2s;
}
.social-btn:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.2);
  color: #fff;
}

/* signup */
.signup {
  text-align: center; margin-top: 1.2rem;
  font-size: 0.8rem; color: var(--muted); font-weight: 600;
}
.signup a {
  color: var(--cyan); text-decoration: none; font-weight: 800; margin-left: 0.2rem;
  transition: opacity .2s;
}
.signup a:hover { opacity: 0.65; }

/* ─── TAGLINE below card ─── */
.tagline {
  margin-top: 1.5rem;
  text-align: center;
  font-size: 0.78rem; color: rgba(255,255,255,0.2);
  font-weight: 600; letter-spacing: 0.04em;
}
</style>
</head>

<script>
// ─── i18n data ───
const i18n = {
  en: {
    title: 'LinknLink Login',
    desc: 'Sign in to get free tokens and activate more services',
    id_label: 'Authentication ID',
    id_placeholder: 'user@sentient.home',
    key_label: 'Access Key',
    forgot: 'Forgot password?',
    signin: 'Sign In',
    or: 'or continue with',
    no_account: "Don't have an account?",
    signup: ' Sign Up',
    tagline: 'Your home gets smarter every day 🦞',
    skip: 'Skip',
  },
  zh: {
    title: 'LinknLink 登录',
    desc: '登录后获取免费 token 和激活更多服务',
    id_label: '认证 ID',
    id_placeholder: 'user@sentient.home',
    key_label: '访问密钥',
    forgot: '忘记密码？',
    signin: '登 录',
    or: '或通过以下方式继续',
    no_account: '还没有账号？',
    signup: ' 立即注册',
    tagline: '让你的家每天更智能 🦞',
    skip: '跳过',
  },
  ja: {
    title: 'LinknLink ログイン',
    desc: 'ログインして無料トークンを取得し、より多くのサービスを有効化',
    id_label: '認証 ID',
    id_placeholder: 'user@sentient.home',
    key_label: 'アクセスキー',
    forgot: 'パスワードを忘れた方',
    signin: 'ログイン',
    or: 'または以下で続ける',
    no_account: 'アカウントをお持ちでない方は',
    signup: ' 新規登録',
    tagline: 'あなたの家が毎日賢くなる 🦞',
    skip: 'スキップ',
  },
  ko: {
    title: 'LinknLink 로그인',
    desc: '로그인하여 무료 토큰을 받고 더 많은 서비스를 활성화하세요',
    id_label: '인증 ID',
    id_placeholder: 'user@sentient.home',
    key_label: '액세스 키',
    forgot: '비밀번호 찾기',
    signin: '로그인',
    or: '또는 다음으로 계속',
    no_account: '계정이 없으신가요?',
    signup: ' 회원가입',
    tagline: '집이 매일 더 스마트해집니다 🦞',
    skip: '건너뛰기',
  },
};

function applyLang(code) {
  const t = i18n[code] || i18n.en;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.textContent = t[key];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const key = el.dataset.i18nPh;
    if (t[key] !== undefined) el.placeholder = t[key];
  });
  document.documentElement.lang = code;
}

// lang buttons
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyLang(btn.dataset.lang);
    localStorage.setItem('homeclaw_lang', btn.dataset.lang);
  });
});


document.getElementById('btn-skip').addEventListener('click', (e) => {
  e.preventDefault();
  localStorage.setItem('isLoggedIn', 'false');
  window.location.href = 'home.html';
});
document.getElementById('btn-signin').addEventListener('click', (e) => {
  e.preventDefault();
  localStorage.setItem('isLoggedIn', 'true');
  window.location.href = 'home.html';
});

// init
const savedLang = localStorage.getItem('homeclaw_lang') || 'en';
document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
const activeBtn = document.querySelector(`.lang-btn[data-lang="${savedLang}"]`);
if (activeBtn) activeBtn.classList.add('active');
applyLang(savedLang);

// bubbles
const bc = document.getElementById('bubbles');
for (let i = 0; i < 14; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  const s = 16 + Math.random() * 55;
  b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:-${s}px;animation-duration:${10+Math.random()*15}s;animation-delay:${Math.random()*15}s;`;
  bc.appendChild(b);
}
</script>
</body>
</html>
