<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XRAY PANEL</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #090b0e;
  --bg2:     #0e1215;
  --bg3:     #141a20;
  --border:  #1c2530;
  --border2: #263040;
  --text:    #c0ccd6;
  --dim:     #445566;
  --accent:  #00e5ff;
  --green:   #00ff9d;
  --yellow:  #ffd600;
  --warn:    #ff6b35;
  --red:     #ff3355;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6;
}

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 70% 10%, rgba(0,229,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(0,255,157,0.03) 0%, transparent 50%);
}

/* ── 顶栏 ── */
header {
  position: relative; z-index: 2;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px; flex-shrink: 0;
  background: var(--bg2); border-bottom: 1px solid var(--border); gap: 12px;
}
.logo { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; letter-spacing: 5px; color: var(--accent); white-space: nowrap; }
.logo em { color: var(--dim); font-style: normal; font-weight: 700; }
.hdr-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.lang-sw { display: flex; gap: 2px; background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
.lang-btn { padding: 5px 12px; font-size: 12px; cursor: pointer; color: var(--dim); background: transparent; border: none; font-family: 'JetBrains Mono', monospace; transition: all .15s; }
.lang-btn:hover { color: var(--text); }
.lang-btn.active { background: var(--border2); color: var(--accent); }

.badge { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 2px; font-size: 12px; letter-spacing: 1px; border: 1px solid var(--border2); color: var(--dim); transition: all .3s; }
.badge.on  { border-color: var(--green); color: var(--green); background: rgba(0,255,157,.06); }
.badge.off { border-color: var(--red);   color: var(--red);   background: rgba(255,51,85,.06); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.badge.on .dot { box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── 主体 ── */
.wrapper { position: relative; z-index: 1; display: flex; height: calc(100vh - 52px); overflow: hidden; }

.col-left { width: 50%; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
.card-status { flex: 0 0 auto; padding: 20px 24px; border-bottom: 1px solid var(--border); }
.card-settings { flex: 0 0 auto; padding: 16px 24px; border-bottom: 1px solid var(--border); }
.card-log    { flex: 1 1 0; padding: 20px 24px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

/* ── 设置行 ── */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.setting-item { display: flex; flex-direction: column; gap: 4px; }
.setting-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }
.setting-input { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 6px 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; border-radius: 3px; outline: none; width: 100%; }
.setting-input:focus { border-color: var(--accent); }
.toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.toggle-label { font-size: 11px; color: var(--dim); flex: 1; }
.toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track { position: absolute; inset: 0; background: var(--border2); border-radius: 20px; cursor: pointer; transition: .2s; }
.toggle input:checked + .toggle-track { background: var(--accent); }
.toggle-track::after { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
.toggle input:checked + .toggle-track::after { transform: translateX(16px); }

.col-right { width: 50%; display: flex; flex-direction: column; overflow: hidden; padding: 20px 24px; }

/* ── 卡片标题 ── */
.card-title { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── 状态格 ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.stat { background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; padding: 10px 13px; }
.stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
.stat-val { font-size: 13px; font-weight: 500; word-break: break-all; }
.c-accent { color: var(--accent); }
.c-green  { color: var(--green); }
.c-red    { color: var(--red); }

/* ── 按钮 ── */
.btn-row { display: flex; gap: 7px; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 3px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: .5px; cursor: pointer; transition: all .15s; user-select: none; white-space: nowrap; }
.btn:hover   { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.05); }
.btn:active  { transform: scale(.97); }
.btn.primary { border-color: var(--accent); color: var(--accent); }
.btn.primary:hover { background: var(--accent); color: var(--bg); }
.btn.green  { border-color: var(--green); color: var(--green); }
.btn.green:hover  { background: var(--green); color: var(--bg); }
.btn.red    { border-color: var(--red); color: var(--red); }
.btn.red:hover    { background: var(--red); color: #fff; }
.btn.sm { padding: 5px 11px; font-size: 12px; }
.btn:disabled { opacity: .3; cursor: not-allowed; }
.btn .ico { font-size: 22px; line-height: 1; }

/* ── 日志 ── */
.log-box { flex: 1 1 0; min-height: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 10px 13px; font-size: 11px; line-height: 1.8; color: #4a6070; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
.log-box .le { color: var(--red); }
.log-box .lw { color: var(--warn); }
.log-box .lo { color: var(--green); }

/* ── 订阅列表 ── */
.sub-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; flex-shrink: 0; }
.sub-item { display: flex; align-items: center; gap: 7px; background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; padding: 7px 10px; }
.sub-item-info { flex: 1; min-width: 0; }
.sub-item-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sub-item-url  { font-size: 10px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.add-row { display: flex; gap: 6px; margin-bottom: 6px; flex-shrink: 0; }
.add-row input { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 7px 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; border-radius: 3px; outline: none; min-width: 0; }
.add-row input:focus { border-color: var(--accent); }
.inp-name { width: 90px; flex-shrink: 0; }
.inp-url  { flex: 1; }

.sub-msg { font-size: 11px; color: var(--dim); margin-bottom: 6px; min-height: 16px; flex-shrink: 0; word-break: break-all; }
.divider { height: 1px; background: var(--border); margin: 10px 0; flex-shrink: 0; }

/* ── 节点工具栏 ── */
.node-toolbar { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 8px; flex-shrink: 0; }
.pbar  { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin-bottom: 4px; flex-shrink: 0; }
.pfill { height: 100%; background: var(--accent); width: 0; transition: width .3s; }
.prog-msg { font-size: 11px; color: var(--dim); margin-bottom: 6px; min-height: 16px; flex-shrink: 0; }

/* ── 节点列表 ── */
.node-list { flex: 1 1 0; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
.node-item { display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 7px; padding: 7px 10px; flex-shrink: 0; background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; transition: border-color .15s; }
.node-item:hover  { border-color: var(--border2); }
.node-item.is-cur { border-color: rgba(0,255,157,.4); background: rgba(0,255,157,.03); }
.node-item.is-test{ border-color: rgba(0,229,255,.3); }
.node-name { font-size: 12px; font-weight: 500; }
.node-addr { font-size: 10px; color: var(--dim); }
.node-ip   { font-size: 10px; color: var(--green); }
.node-tag  { font-size: 10px; padding: 2px 7px; border-radius: 2px; letter-spacing: 1px; white-space: nowrap; font-weight: 600; }
.tag-cur  { background: rgba(0,229,255,.12); color: var(--accent); }

/* 延迟色阶 */
.lat-fast { background: rgba(0,255,157,.15); color: var(--green); }   /* <150ms */
.lat-mid  { background: rgba(255,214,0,.12); color: var(--yellow); }  /* 150-300ms */
.lat-slow { background: rgba(255,107,53,.15); color: var(--warn); }   /* >300ms */
.lat-fail { background: rgba(255,51,85,.12);  color: var(--red); }    /* fail */

.node-group-hdr { font-size: 10px; letter-spacing: 2px; color: var(--dim); padding: 8px 2px 2px; text-transform: uppercase; flex-shrink: 0; }

/* ── Spinner ── */
.spin { display: inline-block; width: 10px; height: 10px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: sp .6s linear infinite; vertical-align: middle; }
@keyframes sp { to { transform: rotate(360deg); } }

/* ── Toast ── */
#toast { position: fixed; bottom: 18px; right: 18px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 8px 16px; border-radius: 3px; font-size: 12px; opacity: 0; transform: translateY(6px); transition: all .2s; z-index: 999; pointer-events: none; }
#toast.show { opacity: 1; transform: translateY(0); }
#toast.ok  { border-color: var(--green); color: var(--green); }
#toast.err { border-color: var(--red);   color: var(--red); }

@media (max-width: 800px) {
  html, body { overflow: auto; height: auto; }
  .wrapper { flex-direction: column; height: auto; overflow: visible; }
  .col-left, .col-right { width: 100%; border-right: none; }
  .card-log { min-height: 200px; }
  .node-list { max-height: 400px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">XRAY <em>PANEL</em></div>
  <div class="hdr-right">
    <div class="lang-sw">
      <button class="lang-btn" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('ja')">日本語</button>
    </div>
    <div class="badge" id="svcBadge"><div class="dot"></div><span id="svcLabel">…</span></div>
    <button class="btn" onclick="refreshStatus()"><span class="ico">⟳</span> <span data-i="refresh">刷新</span></button>
  </div>
</header>

<div class="wrapper">

  <!-- 左栏 -->
  <div class="col-left">
    <div class="card-status">
      <div class="card-title"><span data-i="svcStatus">服务状态</span></div>
      <div class="stat-grid">
        <div class="stat">
          <div class="stat-label" data-i="status">运行状态</div>
          <div class="stat-val" id="stStatus">—</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i="outIP">代理出口 IP</div>
          <div class="stat-val c-green" id="stOutIP">—</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i="nodePort">节点端口</div>
          <div class="stat-val c-accent" id="stPort">—</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i="nodeAddr">节点地址</div>
          <div class="stat-val" id="stAddr" style="font-size:11px">—</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn green"   onclick="svcAction('start')"><span class="ico">▶</span> <span data-i="start">启动</span></button>
        <button class="btn red"     onclick="svcAction('stop')"><span class="ico">■</span> <span data-i="stop">停止</span></button>
        <button class="btn primary" onclick="svcAction('restart')"><span class="ico">↺</span> <span data-i="restart">重启</span></button>
      </div>
    </div>

    <div class="card-settings">
      <div class="card-title"><span data-i="settings">代理设置</span></div>
      <div class="settings-grid">
        <div class="setting-item">
          <div class="setting-label" data-i="socks5Port">SOCKS5 端口</div>
          <input class="setting-input" id="cfgSocks" type="number" value="1080" min="1" max="65535">
        </div>
        <div class="setting-item">
          <div class="setting-label" data-i="httpPort">HTTP 端口</div>
          <input class="setting-input" id="cfgHttp" type="number" value="1081" min="1" max="65535">
        </div>
      </div>
      <div class="toggle-row">
        <span class="toggle-label" data-i="cnRouting">国内流量直连分流</span>
        <label class="toggle">
          <input type="checkbox" id="cfgRouting">
          <div class="toggle-track"></div>
        </label>
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="applySettings()"><span class="ico">↺</span> <span data-i="applySettings">应用设置</span></button>
      </div>
      <div id="settingsMsg" style="font-size:11px;color:var(--dim);margin-top:8px;min-height:16px"></div>
    </div>

    <div class="card-log">
      <div class="card-title">
        <span data-i="log">运行日志</span>
        <button class="btn sm" style="margin-left:auto" onclick="loadLog()"><span data-i="refresh">刷新</span></button>
      </div>
      <div class="log-box" id="logBox">…</div>
    </div>
  </div>

  <!-- 右栏 -->
  <div class="col-right">
    <div class="card-title"><span data-i="nodeMgr">节点管理</span></div>

    <div class="sub-list" id="subList"></div>

    <div class="add-row">
      <input class="inp-name" id="inpSubName" data-ph="subNamePh" placeholder="名称">
      <input class="inp-url"  id="inpSubUrl"  data-ph="subUrlPh"  placeholder="订阅链接">
      <button class="btn primary" onclick="addSub()">+ <span data-i="add">添加</span></button>
    </div>
    <div class="sub-msg" id="subMsg"></div>

    <div class="divider"></div>

    <div class="node-toolbar">
      <button class="btn" onclick="fetchAllSubs()"><span class="ico">⟳</span> <span data-i="fetchAll">拉取全部</span></button>
      <button class="btn" onclick="testAll()"><span class="ico">⚡</span> <span data-i="testAll">全部测试</span></button>
      <button class="btn primary" onclick="autoSelect()"><span class="ico">✦</span> <span data-i="autoSel">自动选优</span></button>
    </div>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
    <div class="prog-msg" id="progMsg"></div>

    <div class="node-list" id="nodeList">
      <div style="color:var(--dim);padding:30px 0;text-align:center" data-i="noNodes">请先添加订阅链接并拉取节点</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══ 多语言 ═══════════════════════════════════════════════════════════════════
const I18N = {
  zh: {
    svcStatus:'服务状态', status:'运行状态', outIP:'代理出口 IP',
    nodePort:'节点端口', nodeAddr:'节点地址',
    start:'启动', stop:'停止', restart:'重启', refresh:'刷新',
    log:'运行日志', nodeMgr:'节点管理',
    subNamePh:'名称', subUrlPh:'订阅链接（?list=ssa 或 ?clash=1）',
    add:'添加', fetchAll:'拉取全部', testAll:'全部测试', autoSel:'自动选优',
    noNodes:'请先添加订阅链接并拉取节点',
    running:'● RUNNING', stopped:'● STOPPED',
    fetching:'拉取中...', fetchOk:'拉取成功，共 {n} 个节点', fetchFail:'拉取失败：',
    testing:'测试 {i}/{total}：', testDone:'完成：{ok}/{total} 可用',
    autoTesting:'自动测试 {i}/{total}：', autoApply:'找到可用节点，应用中...',
    autoDone:'已选用：{name}（{ms}ms）', autoFail:'所有节点不可用',
    applying:'切换节点中...', applied:'已切换：{name}', applyFail:'切换失败：',
    delConfirm:'删除该订阅及其节点？',
    cur:'当前', apiOffline:'API 离线', test:'测试', apply:'应用',
    settings:'代理设置', socks5Port:'SOCKS5 端口', httpPort:'HTTP 端口',
    cnRouting:'国内流量直连分流', applySettings:'应用设置',
    settingsSaved:'设置已应用，服务重启中...', settingsFail:'应用失败：',
    noName:'请输入名称', noUrl:'请输入链接',
  },
  en: {
    svcStatus:'Service Status', status:'Status', outIP:'Outbound IP',
    nodePort:'Port', nodeAddr:'Address',
    start:'Start', stop:'Stop', restart:'Restart', refresh:'Refresh',
    log:'Service Log', nodeMgr:'Node Manager',
    subNamePh:'Label', subUrlPh:'Subscription URL',
    add:'Add', fetchAll:'Fetch All', testAll:'Test All', autoSel:'Auto-select',
    noNodes:'Add a subscription URL and fetch nodes',
    running:'● RUNNING', stopped:'● STOPPED',
    fetching:'Fetching...', fetchOk:'Fetched {n} nodes', fetchFail:'Fetch failed: ',
    testing:'Testing {i}/{total}: ', testDone:'Done: {ok}/{total} available',
    autoTesting:'Auto-test {i}/{total}: ', autoApply:'Found node, applying...',
    autoDone:'Selected: {name} ({ms}ms)', autoFail:'No nodes available',
    applying:'Switching...', applied:'Switched: {name}', applyFail:'Failed: ',
    delConfirm:'Delete this subscription and its nodes?',
    cur:'active', apiOffline:'API offline', test:'Test', apply:'Use',
    settings:'Proxy Settings', socks5Port:'SOCKS5 Port', httpPort:'HTTP Port',
    cnRouting:'China traffic direct routing', applySettings:'Apply Settings',
    settingsSaved:'Settings applied, restarting...', settingsFail:'Failed: ',
    noName:'Enter label', noUrl:'Enter URL',
  },
  ja: {
    svcStatus:'サービス状態', status:'状態', outIP:'出口 IP',
    nodePort:'ポート', nodeAddr:'アドレス',
    start:'起動', stop:'停止', restart:'再起動', refresh:'更新',
    log:'実行ログ', nodeMgr:'ノード管理',
    subNamePh:'名前', subUrlPh:'サブスクリプション URL',
    add:'追加', fetchAll:'全取得', testAll:'全テスト', autoSel:'自動選択',
    noNodes:'URLを追加してノードを取得してください',
    running:'● 稼働中', stopped:'● 停止中',
    fetching:'取得中...', fetchOk:'{n} 件取得', fetchFail:'取得失敗：',
    testing:'テスト {i}/{total}：', testDone:'完了：{ok}/{total} 利用可',
    autoTesting:'自動テスト {i}/{total}：', autoApply:'適用中...',
    autoDone:'選択済み：{name}（{ms}ms）', autoFail:'利用可能なノードなし',
    applying:'切替中...', applied:'切替済み：{name}', applyFail:'失敗：',
    delConfirm:'このサブスクリプションを削除しますか？',
    cur:'使用中', apiOffline:'オフライン', test:'テスト', apply:'適用',
    settings:'プロキシ設定', socks5Port:'SOCKS5 ポート', httpPort:'HTTP ポート',
    cnRouting:'中国トラフィック直接', applySettings:'設定を適用',
    settingsSaved:'適用しました。再起動中...', settingsFail:'失敗: ',
    noName:'名前を入力', noUrl:'URLを入力',
  }
};
const LANG_LABELS = {zh:'中文', en:'EN', ja:'日本語'};
let lang = localStorage.getItem('lang') || 'zh';

function t(key, vars={}) {
  let s = (I18N[lang]||{})[key] || I18N.zh[key] || key;
  for (const [k,v] of Object.entries(vars)) s = s.replace(`{${k}}`, v);
  return s;
}
function setLang(l) {
  lang = l; localStorage.setItem('lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === LANG_LABELS[l]));
  applyI18N();
}
function applyI18N() {
  document.querySelectorAll('[data-i]').forEach(el => { el.textContent = t(el.dataset.i); });
  document.querySelectorAll('[data-ph]').forEach(el => { el.placeholder = t(el.dataset.ph); });
  renderSubList(); renderNodes();
}

// ══ 工具 ═════════════════════════════════════════════════════════════════════
async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  return (await fetch(path, opts)).json();
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let _tt;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show '+type;
  clearTimeout(_tt); _tt = setTimeout(() => el.className='', 3000);
}

// 延迟 → 样式类
function latClass(ms) {
  if (ms === null || ms === undefined) return 'lat-fail';
  if (ms < 150)  return 'lat-fast';
  if (ms < 300)  return 'lat-mid';
  return 'lat-slow';
}
function latLabel(ms) {
  if (ms === null || ms === undefined) return '✗';
  return ms + 'ms';
}

// ══ 订阅管理 ═════════════════════════════════════════════════════════════════
const getSubs  = () => JSON.parse(localStorage.getItem('subs')  || '[]');
const saveSubs = s  => localStorage.setItem('subs',  JSON.stringify(s));
const getNodes  = () => JSON.parse(localStorage.getItem('nodes') || '[]');
const saveNodes = n  => localStorage.setItem('nodes', JSON.stringify(n));

function addSub() {
  const name = document.getElementById('inpSubName').value.trim();
  const url  = document.getElementById('inpSubUrl').value.trim();
  if (!name) { toast(t('noName'),'err'); return; }
  if (!url)  { toast(t('noUrl'),'err');  return; }
  const subs = getSubs();
  subs.push({ id: Date.now().toString(), name, url });
  saveSubs(subs);
  document.getElementById('inpSubName').value = '';
  document.getElementById('inpSubUrl').value  = '';
  renderSubList();
  toast('+ '+name, 'ok');
}

function delSub(id) {
  if (!confirm(t('delConfirm'))) return;
  saveSubs(getSubs().filter(s => s.id !== id));
  saveNodes(getNodes().filter(n => n.subId !== id));
  renderSubList(); renderNodes();
}

function renderSubList() {
  document.getElementById('subList').innerHTML = getSubs().map(s => `
    <div class="sub-item">
      <div class="sub-item-info">
        <div class="sub-item-name">${esc(s.name)}</div>
        <div class="sub-item-url">${esc(s.url)}</div>
      </div>
      <button class="btn sm" onclick="fetchSub('${s.id}')"><span class="ico">⟳</span></button>
      <button class="btn sm red" onclick="delSub('${s.id}')"><span class="ico">✕</span></button>
    </div>
  `).join('');
}

async function fetchSub(id) {
  const sub = getSubs().find(s => s.id === id);
  if (!sub) return;
  const msg = document.getElementById('subMsg');
  msg.innerHTML = `<span class="spin"></span> ${t('fetching')} [${esc(sub.name)}]`;
  const d = await api('/api/subscribe','POST',{url: sub.url});
  if (d.ok) {
    let all = getNodes().filter(n => n.subId !== id);
    d.nodes.forEach(n => all.push({subId:id, subName:sub.name, ...n}));
    saveNodes(all);
    msg.textContent = t('fetchOk',{n:d.count}) + ` [${sub.name}]`;
    nst = {}; renderNodes();
    toast(t('fetchOk',{n:d.count}), 'ok');
  } else {
    msg.textContent = t('fetchFail') + d.msg;
    toast(t('fetchFail') + d.msg, 'err');
  }
}

async function fetchAllSubs() {
  const subs = getSubs();
  if (!subs.length) { toast(t('noUrl'),'err'); return; }
  for (const s of subs) await fetchSub(s.id);
}

// ══ 节点渲染 ═════════════════════════════════════════════════════════════════
let nst = {};          // index → {ok, ip, latency, testing}
let statusData = null;

function renderNodes() {
  const nodes = getNodes();
  const list  = document.getElementById('nodeList');
  if (!nodes.length) {
    list.innerHTML = `<div style="color:var(--dim);padding:30px 0;text-align:center">${t('noNodes')}</div>`;
    return;
  }
  const curPort = statusData?.node?.port;
  list.innerHTML = '';

  const groups = {};
  nodes.forEach((n,i) => {
    const g = n.subName || '—';
    if (!groups[g]) groups[g] = [];
    groups[g].push({n, i});
  });

  for (const [gname, items] of Object.entries(groups)) {
    const hdr = document.createElement('div');
    hdr.className = 'node-group-hdr';
    hdr.textContent = gname;
    list.appendChild(hdr);

    items.forEach(({n, i}) => {
      const st    = nst[i];
      const isCur = n.port === curPort;

      // 延迟标签
      let tag = '';
      if (isCur) {
        tag = `<span class="node-tag tag-cur">${t('cur')}</span>`;
      } else if (st?.testing) {
        tag = '<span class="spin"></span>';
      } else if (st?.ok === true) {
        const cls = latClass(st.latency);
        tag = `<span class="node-tag ${cls}">${latLabel(st.latency)}</span>`;
      } else if (st?.ok === false) {
        tag = `<span class="node-tag lat-fail">✗</span>`;
      }

      const ipLine = st?.ip ? `<div class="node-ip">${esc(st.ip)}</div>` : '';
      const el = document.createElement('div');
      el.className = 'node-item'+(isCur?' is-cur':'')+(st?.testing?' is-test':'');
      el.innerHTML = `
        <div>
          <div class="node-name">${esc(n.name)}</div>
          <div class="node-addr">${esc(n.server)}:${n.port}</div>
          ${ipLine}
        </div>
        ${tag}
        <button class="btn sm" onclick="testOne(${i})">${t('test')}</button>
        <button class="btn sm primary" onclick="applyNode(${i})">${t('apply')}</button>
      `;
      list.appendChild(el);
    });
  }
}

// ══ 测试 & 应用 ═══════════════════════════════════════════════════════════════
async function testOne(i) {
  const n = getNodes()[i];
  nst[i] = {testing:true}; renderNodes();
  const d = await api('/api/test','POST',{server:n.server,port:n.port,password:n.password,method:n.method});
  nst[i] = {ok:d.ok, ip:d.ip, latency:d.latency}; renderNodes();
  const label = d.ok ? `${n.name} ${d.latency}ms` : `${n.name} ✗`;
  toast(label, d.ok?'ok':'err');
}

async function applyNode(i) {
  const n = getNodes()[i];
  toast(t('applying'));
  const d = await api('/api/apply','POST',{server:n.server,port:n.port,password:n.password,method:n.method});
  if (d.ok) { toast(t('applied',{name:n.name}), 'ok'); await refreshStatus(); }
  else toast(t('applyFail')+d.msg, 'err');
}

async function testAll() {
  const nodes = getNodes();
  if (!nodes.length) { toast(t('noNodes'),'err'); return; }
  const pmsg = document.getElementById('progMsg');
  const fill = document.getElementById('pfill');
  nst = {}; renderNodes();
  for (let i=0; i<nodes.length; i++) {
    pmsg.innerHTML = `<span class="spin"></span> ${t('testing',{i:i+1,total:nodes.length})}${esc(nodes[i].name)}`;
    fill.style.width = (i/nodes.length*100)+'%';
    nst[i] = {testing:true}; renderNodes();
    const d = await api('/api/test','POST',{server:nodes[i].server,port:nodes[i].port,password:nodes[i].password,method:nodes[i].method});
    nst[i] = {ok:d.ok, ip:d.ip, latency:d.latency}; renderNodes();
  }
  fill.style.width = '100%';
  const ok = Object.values(nst).filter(s=>s.ok).length;
  pmsg.textContent = t('testDone',{ok, total:nodes.length});
  toast(t('testDone',{ok, total:nodes.length}), 'ok');
  setTimeout(()=>{ fill.style.width='0'; }, 1500);
}

async function autoSelect() {
  const nodes = getNodes();
  if (!nodes.length) { toast(t('noNodes'),'err'); return; }
  const pmsg = document.getElementById('progMsg');
  const fill = document.getElementById('pfill');
  nst = {}; renderNodes();
  for (let i=0; i<nodes.length; i++) {
    pmsg.innerHTML = `<span class="spin"></span> ${t('autoTesting',{i:i+1,total:nodes.length})}${esc(nodes[i].name)}`;
    fill.style.width = (i/nodes.length*100)+'%';
    nst[i] = {testing:true}; renderNodes();
    const d = await api('/api/test','POST',{server:nodes[i].server,port:nodes[i].port,password:nodes[i].password,method:nodes[i].method});
    nst[i] = {ok:d.ok, ip:d.ip, latency:d.latency}; renderNodes();
    if (d.ok) {
      pmsg.textContent = t('autoApply');
      fill.style.width = '100%';
      await applyNode(i);
      pmsg.textContent = t('autoDone',{name:nodes[i].name, ms:d.latency});
      setTimeout(()=>{ fill.style.width='0'; }, 1500);
      return;
    }
  }
  pmsg.textContent = t('autoFail');
  fill.style.width = '0';
}

// ══ 服务状态 ═════════════════════════════════════════════════════════════════
async function applySettings() {
  const socks = parseInt(document.getElementById('cfgSocks').value) || 1080;
  const http  = parseInt(document.getElementById('cfgHttp').value)  || 1081;
  const route = document.getElementById('cfgRouting').checked;
  const msg   = document.getElementById('settingsMsg');
  msg.innerHTML = '<span class="spin"></span> 应用中...';
  const d = await api('/api/settings','POST',{socks_port:socks, http_port:http, routing:route});
  if (d.ok) {
    msg.textContent = t('settingsSaved');
    setTimeout(refreshStatus, 2000);
  } else {
    msg.textContent = t('settingsFail') + d.msg;
  }
}

async function loadSettings() {
  try {
    const d = await api('/api/settings');
    if (d.socks_port) document.getElementById('cfgSocks').value = d.socks_port;
    if (d.http_port)  document.getElementById('cfgHttp').value  = d.http_port;
    if (d.routing !== undefined) document.getElementById('cfgRouting').checked = d.routing;
  } catch {}
}

async function refreshStatus() {
  try {
    const d = await api('/api/status');
    statusData = d;
    const on = d.active;
    document.getElementById('svcBadge').className = 'badge '+(on?'on':'off');
    document.getElementById('svcLabel').textContent = on ? t('running') : t('stopped');
    const stEl = document.getElementById('stStatus');
    stEl.textContent = on ? t('running') : t('stopped');
    stEl.className   = 'stat-val '+(on?'c-green':'c-red');
    document.getElementById('stOutIP').textContent = d.outbound_ip || (on?'…':'—');
    if (d.node) {
      document.getElementById('stPort').textContent = d.node.port;
      document.getElementById('stAddr').textContent = d.node.address;
    }
    renderNodes();
  } catch {
    document.getElementById('svcBadge').className = 'badge off';
    document.getElementById('svcLabel').textContent = t('apiOffline');
  }
}

async function svcAction(action) {
  toast(action+'…');
  const d = await api('/api/service/'+action,'POST');
  toast(d.ok ? action+' OK' : 'fail: '+d.msg, d.ok?'ok':'err');
  setTimeout(refreshStatus, 1200);
}

// ══ 日志 ═════════════════════════════════════════════════════════════════════
async function loadLog() {
  const box = document.getElementById('logBox');
  const d = await api('/api/log');
  box.innerHTML = (d.log||'').split('\n').map(l => {
    if (/error|failed/i.test(l)) return `<span class="le">${esc(l)}</span>`;
    if (/warn/i.test(l))         return `<span class="lw">${esc(l)}</span>`;
    if (/start|running|active/i.test(l)) return `<span class="lo">${esc(l)}</span>`;
    return esc(l);
  }).join('\n');
  box.scrollTop = box.scrollHeight;
}

// ══ 初始化 ═══════════════════════════════════════════════════════════════════
(async () => {
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === LANG_LABELS[lang])
  );
  applyI18N();
  await refreshStatus();
  loadSettings();
  loadLog();
})();

setInterval(refreshStatus, 8000);
</script>
